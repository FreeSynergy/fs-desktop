[package]
name        = "fsd-studio"
description = "FreeSynergy Desktop – Studio: plugin, module and i18n creator"
version.workspace   = true
edition.workspace   = true
license.workspace   = true

[lib]
name = "fsd_studio"
path = "src/lib.rs"

[[bin]]
name = "fsd-studio"
path = "src/main.rs"

[features]
default  = ["desktop"]
desktop  = ["dioxus/desktop", "fsn-components/desktop"]
web      = ["dioxus/web",     "fsn-components/web"]

[dependencies]
fsd-db         = { workspace = true }
fsn-components = { workspace = true }
fsn-store      = { workspace = true }
fsn-i18n       = { workspace = true }
dioxus         = { workspace = true }
serde          = { workspace = true }
serde_json     = { workspace = true }
serde_yaml     = { workspace = true }
reqwest        = { workspace = true }
tracing        = { workspace = true }
tokio          = { workspace = true }
